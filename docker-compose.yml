services:
  cert-gen:
    build:
      context: .
      dockerfile: mikrom-proto/Dockerfile.cert-gen
    environment:
      CERTS_OUT_DIR: /certs
    volumes:
      - certs:/certs

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: mikrom
      POSTGRES_PASSWORD: mikrom_password
      POSTGRES_DB: mikrom_api
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mikrom -d mikrom_api"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - mikrom

  mikrom-scheduler:
    build:
      context: .
      dockerfile: mikrom-scheduler/Dockerfile
    environment:
      USE_TLS: "true"
      CERTS_DIR: /certs/scheduler
    ports:
      - "5002:5002"
    volumes:
      - certs:/certs
    depends_on:
      cert-gen:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 5002"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mikrom

  mikrom-agent:
    build:
      context: .
      dockerfile: mikrom-agent/Dockerfile
    environment:
      SCHEDULER_ADDR: https://mikrom-scheduler:5002
      AGENT_PORT: "5003"
      AGENT_HOSTNAME: mikrom-agent
      USE_TLS: "true"
      CERTS_DIR: /certs/agent
      FC_KERNEL_PATH: ${FC_KERNEL_PATH:-/opt/firecracker/vmlinux-6.1.155}
      FC_ROOTFS_PATH: ${FC_ROOTFS_PATH:-/opt/firecracker/ubuntu-24.04.ext4}
      FC_BINARY: /usr/local/bin/firecracker
    ports:
      - "5003:5003"
    devices:
      - /dev/kvm:/dev/kvm
    volumes:
      - certs:/certs
      - /opt/firecracker:/opt/firecracker:ro
      - /usr/local/bin/firecracker:/usr/local/bin/firecracker:ro
    depends_on:
      cert-gen:
        condition: service_completed_successfully
      mikrom-scheduler:
        condition: service_started
    networks:
      - mikrom

  mikrom-api:
    build:
      context: .
      dockerfile: mikrom-api/Dockerfile
    environment:
      DATABASE_URL: postgres://mikrom:mikrom_password@postgres:5432/mikrom_api
      SCHEDULER_ADDR: https://mikrom-scheduler:5002
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      USE_TLS: "true"
      CERTS_DIR: /certs/api
    ports:
      - "5001:5001"
    volumes:
      - certs:/certs
    depends_on:
      cert-gen:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      mikrom-scheduler:
        condition: service_started
    networks:
      - mikrom

  mikrom-app:
    build:
      context: mikrom-app
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - mikrom-api
    networks:
      - mikrom

volumes:
  postgres_data:
  certs:

networks:
  mikrom:
    driver: bridge
