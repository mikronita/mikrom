services:
  cert-gen:
    build:
      context: .
      dockerfile: mikrom-proto/Dockerfile.cert-gen
    environment:
      CERTS_OUT_DIR: /certs
    volumes:
      - certs:/certs

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: mikrom
      POSTGRES_PASSWORD: mikrom_password
      POSTGRES_DB: mikrom_default
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mikrom -d mikrom_default"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - mikrom

  nats:
    image: nats:2.10-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    networks:
      - mikrom

  mikrom-scheduler:
    build:
      context: .
      dockerfile: mikrom-scheduler/Dockerfile
    environment:
      NATS_URL: nats://nats:4222
      DATABASE_URL: postgres://mikrom:mikrom_password@postgres:5432/mikrom_scheduler
      USE_TLS: "true"
      CERTS_DIR: /certs/scheduler
    ports:
      - "5002:5002"
    volumes:
      - certs:/certs
    depends_on:
      cert-gen:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 5002"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mikrom

  mikrom-api:
    build:
      context: .
      dockerfile: mikrom-api/Dockerfile
    environment:
      NATS_URL: nats://nats:4222
      DATABASE_URL: postgres://mikrom:mikrom_password@postgres:5432/mikrom_api
      SCHEDULER_ADDR: https://mikrom-scheduler:5002
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      USE_TLS: "true"
      CERTS_DIR: /certs/api
    ports:
      - "5001:5001"
    volumes:
      - certs:/certs
    depends_on:
      cert-gen:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      mikrom-scheduler:
        condition: service_started
    networks:
      - mikrom

  mikrom-router:
    build:
      context: .
      dockerfile: mikrom-router/Dockerfile
    environment:
      NATS_URL: nats://nats:4222
      DATABASE_URL: postgres://mikrom:mikrom_password@postgres:5432/mikrom_router
      PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      cert-gen:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    networks:
      - mikrom

  mikrom-builder:
    build:
      context: .
      dockerfile: mikrom-builder/Dockerfile
    environment:
      NATS_URL: nats://nats:4222
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - nats
    networks:
      - mikrom

  buildkit:
    image: moby/buildkit
    privileged: true
    networks:
      - mikrom

  mikrom-app:
    build:
      context: mikrom-app
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - mikrom-api
    networks:
      - mikrom

volumes:
  postgres_data:
  certs:

networks:
  mikrom:
    driver: bridge
