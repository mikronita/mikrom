services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: mikrom
      POSTGRES_PASSWORD: mikrom_password
      POSTGRES_DB: mikrom_default
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mikrom -d mikrom_default"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - mikrom

  nats:
    image: nats:2.10-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    networks:
      - mikrom

  nats-test:
    image: nats:2.10-alpine
    ports:
      - "4223:4222"
      - "8223:8222"
    profiles:
      - test
    networks:
      - mikrom

  buildkit:
    image: moby/buildkit
    privileged: true
    profiles:
      - buildkit
    networks:
      - mikrom

  otel-lgtm:
    image: grafana/otel-lgtm:latest
    ports:
      - "3000:3000" # Grafana
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
      - "9090:9090" # Prometheus
      - "3100:3100" # Loki
      - "3200:3200" # Tempo
    volumes:
      - ./observability/prometheus.yml:/otel-lgtm/prometheus.yaml
      - ./observability/grafana/provisioning/dashboards/dashboards.yml:/otel-lgtm/grafana/conf/provisioning/dashboards/custom.yaml
      - ./observability/grafana/dashboards:/otel-lgtm/grafana/conf/provisioning/dashboards/custom
    profiles:
      - observability
    networks:
      - mikrom
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
  certs:

networks:
  mikrom:
    driver: bridge
