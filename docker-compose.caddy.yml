services:
  mikrom-router-caddy:
    build:
      context: ./mikrom-router-caddy
      dockerfile: Dockerfile
    environment:
      NATS_URL: nats://nats:4222
      DATABASE_URL: postgres://mikrom:mikrom_password@postgres:5432/mikrom_router
      MASTER_KEY: ${MASTER_KEY:-default_master_key}
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    networks:
      - mikrom
