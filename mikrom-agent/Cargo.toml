[package]
name = "mikrom-agent"
version = "0.1.1"
edition = "2024"

[lints]
workspace = true

[dependencies]
tokio.workspace = true
tonic.workspace = true
prost.workspace = true
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
tower = "0.5"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
thiserror = "2"
async-trait = "0.1"
parking_lot = "0.12"
tokio-stream = "0.1"
sysinfo = "0.32"
hostname = "0.4"
envy.workspace = true

mikrom-proto = { path = "../mikrom-proto" }
dotenvy = "0.15"
anyhow.workspace = true
tokio-util = { version = "0.7.18", features = ["io", "codec"] }
futures = "0.3.32"
opentelemetry = "0.31.0"
opentelemetry_sdk = "0.31.0"
opentelemetry-otlp = "0.31.1"
tracing-opentelemetry = "0.32.1"
opentelemetry-semantic-conventions = "0.31.0"

[package.metadata.deb]
maintainer = "Antonio Pardo <apardo@spluca.org>"
copyright = "2026, Mikrom Team"
license-file = ["../LICENSE", "0"]
extended-description = """\
Mikrom Agent is a daemon that runs on compute nodes to manage Firecracker microVMs.
It communicates with the Mikrom Scheduler to deploy and manage workloads.
"""
depends = "libc6, libssl3, iptables"
section = "admin"
priority = "optional"
assets = [
    ["target/release/mikrom-agent", "/usr/bin/mikrom-agent", "755"],
    ["debian/mikrom-agent.service", "/lib/systemd/system/mikrom-agent.service", "644"],
    ["debian/agent.env", "/etc/mikrom/agent.env", "644"],
]
systemd-units = { unit-name = "mikrom-agent" }

[build-dependencies]
tonic-build.workspace = true

[features]
default = ["build"]
build = []
