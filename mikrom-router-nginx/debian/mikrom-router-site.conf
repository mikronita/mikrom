# Mikrom Router Site Configuration
# This file provides the default routing logic for Mikrom.

# Default catch-all block to reject connections without SNI or matching server name
server {
    listen 80 default_server;
    listen 443 ssl default_server;
    server_name _;

    ssl_reject_handshake on;

    return 444;
}

# Dynamic domain block for applications
server {
    listen 80;
    server_name ~^(?<domain>.+)$;

    # ACME Challenges (Handled by the Rust module)
    # Must stay on HTTP for initial certification
    location /.well-known/acme-challenge/ {
        mikrom_acme_challenge on;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name ~^(?<domain>.+)$;

    # Static fallback SSL certificates to satisfy Nginx parser
    # Uses Debian's default snakeoil certs if available. 
    # NOTE: If these files don't exist, Nginx may throw internal errors during handshake.
    ssl_certificate /etc/ssl/certs/ssl-cert-snakeoil.pem;
    ssl_certificate_key /etc/ssl/private/ssl-cert-snakeoil.key;

    # Dynamic SSL Certificates based on SNI
    # These override the static fallback when a match exists.
    # NGINX evaluates these at request time.
    ssl_certificate /tmp/mikrom/ssl/$ssl_server_name.crt;
    ssl_certificate_key /tmp/mikrom/ssl/$ssl_server_name.key;

    # Main Routing Logic
    location / {
        mikrom_router on;

        # Use the resolved target from the Rust module
        proxy_pass http://$mikrom_target;

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Add tracking header
        add_header X-Mikrom-Router "Active";
    }
}
