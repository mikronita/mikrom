[workspace]
members = [
    "mikrom-proto",
    "mikrom-scheduler",
    "mikrom-agent",
    "mikrom-api",
    "mikrom-cli",
]
resolver = "2"

[workspace.dependencies]
tonic = { version = "0.12.3", features = ["transport", "tls"] }
prost = "0.13"
tonic-build = "0.12.3"
tokio = { version = "1", features = ["full"] }
