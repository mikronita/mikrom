syntax = "proto3";

package mikrom.agent.v1;

option go_package = "github.com/antpard/mikrom/mikrom-proto/proto/agent/v1";

service AgentService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Unregister(UnregisterRequest) returns (UnregisterResponse);
  rpc ReportMetrics(MetricsRequest) returns (MetricsResponse);
  rpc GetMetrics(GetMetricsRequest) returns (GetMetricsResponse);
  rpc GetLogs(GetLogsRequest) returns (stream GetLogsResponse);
  rpc StartVm(StartVmRequest) returns (StartVmResponse);
  rpc StopVm(StopVmRequest) returns (StopVmResponse);
  rpc PauseVm(PauseVmRequest) returns (PauseVmResponse);
  rpc ResumeVm(ResumeVmRequest) returns (ResumeVmResponse);
  rpc DeleteVm(DeleteVmRequest) returns (DeleteVmResponse);
  rpc GetVmStatus(GetVmStatusRequest) returns (GetVmStatusResponse);
  rpc CheckHealth(CheckHealthRequest) returns (CheckHealthResponse);
  rpc UpdateFirewall(UpdateFirewallRequest) returns (UpdateFirewallResponse);
}

message CheckHealthRequest {
  string vm_id = 1;
}

message CheckHealthResponse {
  bool is_healthy = 1;
  string message = 2;
}

message AgentCommand {
  oneof command {
    StartVmRequest start_vm = 1;
    StopVmRequest stop_vm = 2;
    PauseVmRequest pause_vm = 3;
    ResumeVmRequest resume_vm = 4;
    DeleteVmRequest delete_vm = 5;
    UpdateFirewallRequest update_firewall = 6;
    CreateSnapshotRequest create_snapshot = 7;
    DeleteVolumeRequest delete_volume = 8;
    DeleteSnapshotRequest delete_snapshot = 9;
    CreateVolumeRequest create_volume = 10;
    RestoreSnapshotRequest restore_snapshot = 11;
    CloneVolumeRequest clone_volume = 12;
    VmSnapshotCreateRequest vm_snapshot_create = 13;
    VmSnapshotRestoreRequest vm_snapshot_restore = 14;
    VmSnapshotDeleteRequest vm_snapshot_delete = 15;
    VmSnapshotListRequest vm_snapshot_list = 16;
    AttachVolumeRequest attach_volume = 17;
    DetachVolumeRequest detach_volume = 18;
    StartMigrationRequest start_migration = 19;
    CancelMigrationRequest cancel_migration = 20;
    QueryMigrationRequest query_migration = 21;
    SetBalloonRequest set_balloon = 22;
    QueryBalloonRequest query_balloon = 23;
  }
}

message CloneVolumeRequest {
  string source_volume_id = 1;
  string snapshot_name = 2;
  string target_volume_id = 3;
  string pool_name = 4;
}

message RestoreSnapshotRequest {
  string volume_id = 1;
  string snapshot_name = 2;
  string pool_name = 3;
}

message CreateVolumeRequest {
  string volume_id = 1;
  uint32 size_mib = 2;
  string pool_name = 3;
}

message DeleteSnapshotRequest {
  string volume_id = 1;
  string snapshot_name = 2;
  string pool_name = 3;
}

message CreateSnapshotRequest {
  string volume_id = 1;
  string snapshot_name = 2;
  string pool_name = 3;
}

message DeleteVolumeRequest {
  string volume_id = 1;
  string pool_name = 2;
}

message FirewallRule {
  string protocol = 1;
  int32 port_start = 2;
  int32 port_end = 3;
  string action = 4;
}

message UpdateFirewallRequest {
  string vm_id = 1;
  repeated FirewallRule rules = 2;
}

message UpdateFirewallResponse {
  bool success = 1;
  string message = 2;
}

message AgentCommandResponse {
  bool success = 1;
  string message = 2;
}

message DeleteVmRequest {
  string vm_id = 1;
}

message DeleteVmResponse {
  bool success = 1;
  string message = 2;
}

// ... other messages ...

message PauseVmRequest {
  string vm_id = 1;
}

message PauseVmResponse {
  bool success = 1;
  string message = 2;
}

message ResumeVmRequest {
  string vm_id = 1;
}

message ResumeVmResponse {
  bool success = 1;
  string message = 2;
}

message RegisterRequest {
  reserved 3;
  string host_id = 1;
  string hostname = 2;
}

message RegisterResponse {
  bool success = 1;
  string message = 2;
}

message UnregisterRequest {
  string host_id = 1;
}

message UnregisterResponse {
  bool success = 1;
  string message = 2;
}

message VmMetrics {
  reserved 5;
  float cpu_usage = 1;
  uint64 ram_used_bytes = 2;
  VmStatus status = 3;
  string error_message = 4;
}

message MetricsRequest {
  string host_id = 1;
  float cpu_usage = 2;
  uint64 ram_used_bytes = 3;
  uint64 ram_total_bytes = 4;
  uint64 disk_used_bytes = 5;
  uint64 disk_total_bytes = 6;
  uint32 apps_count = 7;
  int64 timestamp = 8;
  float load_avg_1 = 9;
  float load_avg_5 = 10;
  float load_avg_15 = 11;
  map<string, VmMetrics> vms = 12;
}

message MetricsResponse {
  bool success = 1;
}

message GetMetricsRequest {
  string host_id = 1;
}

message GetMetricsResponse {
  string host_id = 1;
  float cpu_usage = 2;
  uint64 ram_used_bytes = 3;
  uint64 ram_total_bytes = 4;
  uint64 disk_used_bytes = 5;
  uint64 disk_total_bytes = 6;
  uint32 apps_count = 7;
  int64 timestamp = 8;
  float load_avg_1 = 9;
  float load_avg_5 = 10;
  float load_avg_15 = 11;
  map<string, VmMetrics> vms = 12;
}

message GetLogsRequest {
  string vm_id = 1;
  bool follow = 2;
}

message GetLogsResponse {
  string line = 1;
  int64 timestamp = 2;
}

message StartVmRequest {
  string vm_id = 1;
  string app_id = 2;
  string image = 3;
  VmConfig config = 4;
}

enum HypervisorType {
  HYPERTYPE_UNSPECIFIED = 0;
  HYPERTYPE_FIRECRACKER = 1;
  HYPERTYPE_QEMU_MICROVM = 2;
  HYPERTYPE_CLOUD_HYPERVISOR = 3;
}

message Volume {
  string volume_id = 1;
  uint64 size_mib = 2;
  bool read_only = 3;
  string pool_name = 4;
  string mount_point = 5;
  AccessMode access_mode = 6;
}

enum AccessMode {
  ACCESS_MODE_READ_WRITE_ONCE = 0;
  ACCESS_MODE_READ_WRITE_MANY = 1;
  ACCESS_MODE_READ_ONLY_MANY = 2;
}

message VmConfig {
  reserved 5, 6, 7, 8;
  uint32 vcpus = 1;
  uint32 memory_mib = 2;
  uint32 disk_mib = 3;
  map<string, string> env = 4;
  repeated Volume volumes = 9;
  uint32 port = 10;
  string health_check_path = 11;
  string ipv6_address = 12;
  string ipv6_gateway = 13;
  HypervisorType hypervisor = 14;
}


message StartVmResponse {
  bool success = 1;
  string vm_id = 2;
  string message = 3;
}

message StopVmRequest {
  string vm_id = 1;
}

message StopVmResponse {
  bool success = 1;
  string message = 2;
}

message GetVmStatusRequest {
  string vm_id = 1;
}

message GetVmStatusResponse {
  string vm_id = 1;
  VmStatus status = 2;
  int64 started_at = 3;
  string error_message = 4;
}

message VmFailureEvent {
  string vm_id = 1;
  string error_message = 2;
}

enum VmStatus {
  VM_STATUS_UNSPECIFIED = 0;
  VM_STATUS_STARTING = 1;
  VM_STATUS_RUNNING = 2;
  VM_STATUS_STOPPING = 3;
  VM_STATUS_STOPPED = 4;
  VM_STATUS_FAILED = 5;
  VM_STATUS_PAUSED = 6;
}

message VmLogPayload {
  string line = 1;
  int64 timestamp = 2;
}

// ── VM Snapshot Operations ─────────────────────────────────────────────────
message VmSnapshotCreateRequest {
  string vm_id = 1;
  string snapshot_name = 2;
}

message VmSnapshotCreateResponse {
  bool success = 1;
  string message = 2;
}

message VmSnapshotRestoreRequest {
  string vm_id = 1;
  string snapshot_name = 2;
}

message VmSnapshotRestoreResponse {
  bool success = 1;
  string message = 2;
}

message VmSnapshotDeleteRequest {
  string vm_id = 1;
  string snapshot_name = 2;
}

message VmSnapshotDeleteResponse {
  bool success = 1;
  string message = 2;
}

message VmSnapshotListRequest {
  string vm_id = 1;
}

message VmSnapshotInfo {
  string id = 1;
  string name = 2;
  int64 created_at = 3;
  int64 size_bytes = 4;
  string vm_status = 5;
}

message VmSnapshotListResponse {
  bool success = 1;
  string message = 2;
  repeated VmSnapshotInfo snapshots = 3;
}

// ── VM Volume Hot-Plug ─────────────────────────────────────────────────────
message AttachVolumeRequest {
  string vm_id = 1;
  string volume_id = 2;
  string mount_point = 3;
  bool read_only = 4;
}

message AttachVolumeResponse {
  bool success = 1;
  string message = 2;
}

message DetachVolumeRequest {
  string vm_id = 1;
  string volume_id = 2;
}

message DetachVolumeResponse {
  bool success = 1;
  string message = 2;
}

// ── VM Live Migration ──────────────────────────────────────────────────────
message StartMigrationRequest {
  string vm_id = 1;
  string target_host = 2;
  string target_uri = 3;
}

message StartMigrationResponse {
  bool success = 1;
  string message = 2;
}

message CancelMigrationRequest {
  string vm_id = 1;
}

message CancelMigrationResponse {
  bool success = 1;
  string message = 2;
}

message QueryMigrationRequest {
  string vm_id = 1;
}

message QueryMigrationResponse {
  bool success = 1;
  string message = 2;
  string status = 3;
  int64 total_bytes = 4;
  int64 transferred_bytes = 5;
  int64 remaining_bytes = 6;
}

// ── VM Balloon ─────────────────────────────────────────────────────────────
message SetBalloonRequest {
  string vm_id = 1;
  uint32 target_memory_mib = 2;
}

message SetBalloonResponse {
  bool success = 1;
  string message = 2;
}

message QueryBalloonRequest {
  string vm_id = 1;
}

message QueryBalloonResponse {
  bool success = 1;
  string message = 2;
  uint32 actual_memory_mib = 3;
  uint32 max_memory_mib = 4;
}
