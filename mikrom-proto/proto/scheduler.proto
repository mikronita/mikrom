syntax = "proto3";

package mikrom.scheduler.v1;

option go_package = "github.com/antpard/mikrom/mikrom-proto/proto/scheduler/v1";

message NetworkMeshUpdate {
  repeated Peer peers = 1;
}

message FirewallRule {
  string protocol = 1;
  int32 port_start = 2;
  int32 port_end = 3;
  string action = 4;
}

message UpdateSecurityGroupsRequest {
  string app_id = 1;
  string user_id = 2;
  repeated FirewallRule rules = 3;
}

message UpdateSecurityGroupsResponse {
  bool success = 1;
  string message = 2;
}

message Peer {
  string host_id = 1;
  string endpoint = 2;
  string wireguard_pubkey = 3;
  repeated string allowed_ips = 4;
  int32 wireguard_port = 5;
}

service SchedulerService {
  rpc RegisterWorker(RegisterWorkerRequest) returns (RegisterWorkerResponse);
  rpc ReportMetrics(ReportMetricsRequest) returns (ReportMetricsResponse);
  rpc DeployApp(DeployRequest) returns (DeployResponse);
  rpc GetAppStatus(AppStatusRequest) returns (AppStatusResponse);
  rpc GetAppLogs(GetLogsRequest) returns (stream GetLogsResponse);
  rpc CancelApp(CancelRequest) returns (CancelResponse);
  rpc PauseApp(PauseRequest) returns (PauseResponse);
  rpc ResumeApp(ResumeRequest) returns (ResumeResponse);
  rpc DeleteApp(DeleteAppRequest) returns (DeleteAppResponse);
  rpc DeleteAllByApp(DeleteAllByAppRequest) returns (DeleteAllByAppResponse);
  rpc ScaleApp(ScaleAppRequest) returns (ScaleAppResponse);
  rpc ListApps(ListAppsRequest) returns (ListAppsResponse);
  rpc ListWorkers(ListWorkersRequest) returns (ListWorkersResponse);
  rpc WatchApps(WatchAppsRequest) returns (stream WatchAppsResponse);
  rpc CheckHealth(CheckHealthRequest) returns (CheckHealthResponse);
  rpc UpdateSecurityGroups(UpdateSecurityGroupsRequest) returns (UpdateSecurityGroupsResponse);
  rpc UpdateAppScalingConfig(UpdateAppScalingConfigRequest) returns (UpdateAppScalingConfigResponse);

  // Storage operations
  rpc CreateVolume(CreateVolumeRequest) returns (CreateVolumeResponse);
  rpc DeleteVolume(DeleteVolumeRequest) returns (DeleteVolumeResponse);
  rpc CreateSnapshot(CreateSnapshotRequest) returns (CreateSnapshotResponse);
  rpc DeleteSnapshot(DeleteSnapshotRequest) returns (DeleteSnapshotResponse);
  rpc RestoreSnapshot(RestoreSnapshotRequest) returns (RestoreSnapshotResponse);
  rpc CloneVolume(CloneVolumeRequest) returns (CloneVolumeResponse);

  // VM runtime operations
  rpc VmSnapshotCreate(VmSnapshotCreateRequest) returns (VmSnapshotCreateResponse);
  rpc VmSnapshotRestore(VmSnapshotRestoreRequest) returns (VmSnapshotRestoreResponse);
  rpc VmSnapshotDelete(VmSnapshotDeleteRequest) returns (VmSnapshotDeleteResponse);
  rpc VmSnapshotList(VmSnapshotListRequest) returns (VmSnapshotListResponse);
  rpc AttachVolume(AttachVolumeRequest) returns (AttachVolumeResponse);
  rpc DetachVolume(DetachVolumeRequest) returns (DetachVolumeResponse);
  rpc StartMigration(StartMigrationRequest) returns (StartMigrationResponse);
  rpc CancelMigration(CancelMigrationRequest) returns (CancelMigrationResponse);
  rpc QueryMigration(QueryMigrationRequest) returns (QueryMigrationResponse);
  rpc SetBalloon(SetBalloonRequest) returns (SetBalloonResponse);
  rpc QueryBalloon(QueryBalloonRequest) returns (QueryBalloonResponse);
}

message CloneVolumeRequest {
  string source_volume_id = 1;
  string snapshot_name = 2;
  string target_volume_id = 3;
  string pool_name = 4;
  string host_id = 5;
}

message CloneVolumeResponse {
  bool success = 1;
  string message = 2;
}

message RestoreSnapshotRequest {
  string volume_id = 1;
  string snapshot_name = 2;
  string pool_name = 3;
  string host_id = 4;
}

message RestoreSnapshotResponse {
  bool success = 1;
  string message = 2;
}

message CreateVolumeRequest {
  string volume_id = 1;
  uint32 size_mib = 2;
  string pool_name = 3;
  string host_id = 4;
}

message CreateVolumeResponse {
  bool success = 1;
  string message = 2;
}

message DeleteVolumeRequest {
  string volume_id = 1;
  string pool_name = 2;
  string host_id = 3;
}

message DeleteVolumeResponse {
  bool success = 1;
  string message = 2;
}

message CreateSnapshotRequest {
  string volume_id = 1;
  string snapshot_name = 2;
  string pool_name = 3;
  string host_id = 4;
}

message CreateSnapshotResponse {
  bool success = 1;
  string message = 2;
}

message DeleteSnapshotRequest {
  string volume_id = 1;
  string snapshot_name = 2;
  string pool_name = 3;
  string host_id = 4;
}

message DeleteSnapshotResponse {
  bool success = 1;
  string message = 2;
}

message CheckHealthRequest {
  string job_id = 1;
  string user_id = 2;
}

message CheckHealthResponse {
  bool is_healthy = 1;
  string message = 2;
}

message WatchAppsRequest {
  string user_id = 1;
}

message WatchAppsResponse {
  AppInfo app = 1;
}

message WorkerHeartbeat {
  reserved 3, 4, 5;
  string host_id = 1;
  string hostname = 2;
  ReportMetricsRequest metrics = 6;
  string wireguard_pubkey = 7;
  string wireguard_ip = 8;
  int32 wireguard_port = 9;
  string advertise_address = 10;
  repeated HypervisorType supported_hypervisors = 11;
}

message RouterHeartbeat {
  reserved 3;
  string host_id = 1;
  string hostname = 2;
  string wireguard_pubkey = 7;
  string wireguard_ip = 8;
  int32 wireguard_port = 9;
  string advertise_address = 10;
}

message ListWorkersRequest {}

message ListWorkersResponse {
  repeated WorkerInfo workers = 1;
}

message WorkerInfo {
  reserved 3, 4, 5;
  string host_id = 1;
  string hostname = 2;
  int64 last_heartbeat = 6;
  string wireguard_pubkey = 7;
  string advertise_address = 8;
}

message ScaleAppRequest {
  string app_id = 1;
  uint32 desired_replicas = 2;
  string user_id = 3;
}

message ScaleAppResponse {
  bool success = 1;
  string message = 2;
}

message PauseRequest {
  string job_id = 1;
  string user_id = 2;
}

message PauseResponse {
  bool success = 1;
  string message = 2;
}

message ResumeRequest {
  string job_id = 1;
  string user_id = 2;
}

message ResumeResponse {
  bool success = 1;
  string message = 2;
}

message GetLogsRequest {
  string job_id = 1;
  string user_id = 2;
  bool follow = 3;
}

message GetLogsResponse {
  string line = 1;
  int64 timestamp = 2;
}

message DeleteAppRequest {
  string job_id = 1;
  string user_id = 2;
}

message DeleteAppResponse {
  bool success = 1;
  string message = 2;
}

message DeleteAllByAppRequest {
  string app_id = 1;
  string user_id = 2;
}

message DeleteAllByAppResponse {
  bool success = 1;
  string message = 2;
}

message RegisterWorkerRequest {
  reserved 3, 4, 5;
  string host_id = 1;
  string hostname = 2;
  string wireguard_pubkey = 6;
  repeated HypervisorType supported_hypervisors = 7;
}

message RegisterWorkerResponse {
  bool success = 1;
  string message = 2;
}

message VmMetrics {
  reserved 5;
  float cpu_usage = 1;
  uint64 ram_used_bytes = 2;
  VmStatus status = 3;
  string error_message = 4;
  uint64 tx_bytes = 6;
  uint64 rx_bytes = 7;
}

enum VmStatus {
  VM_STATUS_UNSPECIFIED = 0;
  VM_STATUS_STARTING = 1;
  VM_STATUS_RUNNING = 2;
  VM_STATUS_STOPPING = 3;
  VM_STATUS_STOPPED = 4;
  VM_STATUS_FAILED = 5;
  VM_STATUS_PAUSED = 6;
}

message ReportMetricsRequest {
  string host_id = 1;
  float cpu_usage = 2;
  uint64 ram_used_bytes = 3;
  uint64 ram_total_bytes = 4;
  uint64 disk_used_bytes = 5;
  uint64 disk_total_bytes = 6;
  uint32 apps_count = 7;
  int64 timestamp = 8;
  float load_avg_1 = 9;
  float load_avg_5 = 10;
  float load_avg_15 = 11;
  map<string, VmMetrics> vms = 12;
}

message ReportMetricsResponse {
  bool success = 1;
}

message DeployRequest {
  string app_id = 1;
  string app_name = 2;
  string image = 3;
  AppConfig config = 4;
  string user_id = 5;
  string deployment_id = 6;
  string vpc_ipv6_prefix = 7;
}

enum HypervisorType {
  HYPERTYPE_UNSPECIFIED = 0;
  HYPERTYPE_FIRECRACKER = 1;
  HYPERTYPE_QEMU_MICROVM = 2;
  HYPERTYPE_CLOUD_HYPERVISOR = 3;
}

message Volume {
  string volume_id = 1;
  uint64 size_mib = 2;
  bool read_only = 3;
  string pool_name = 4;
  string mount_point = 5;
  AccessMode access_mode = 6;
}

enum AccessMode {
  ACCESS_MODE_READ_WRITE_ONCE = 0;
  ACCESS_MODE_READ_WRITE_MANY = 1;
  ACCESS_MODE_READ_ONLY_MANY = 2;
}

message AppConfig {
  reserved 5, 6, 7;
  uint32 vcpus = 1;
  uint32 memory_mib = 2;
  uint32 disk_mib = 3;
  map<string, string> env = 4;
  repeated Volume volumes = 8;
  uint32 port = 9;
  string health_check_path = 10;
  string ipv6_address = 11;
  string ipv6_gateway = 12;
  HypervisorType hypervisor = 13;
}


message DeployResponse {
  reserved 6;
  string job_id = 1;
  DeployStatus status = 2;
  string host_id = 3;
  string vm_id = 4;
  string message = 5;
}

enum DeployStatus {
  DEPLOY_STATUS_UNSPECIFIED = 0;
  DEPLOY_STATUS_PENDING = 1;
  DEPLOY_STATUS_SCHEDULED = 2;
  DEPLOY_STATUS_RUNNING = 3;
  DEPLOY_STATUS_FAILED = 4;
  DEPLOY_STATUS_CANCELLED = 5;
  DEPLOY_STATUS_PAUSED = 6;
}

message AppStatusRequest {
  string job_id = 1;
  string user_id = 2;
}

message AppStatusResponse {
  reserved 11;
  string job_id = 1;
  DeployStatus status = 2;
  string host_id = 3;
  string vm_id = 4;
  int64 scheduled_at = 5;
  int64 started_at = 6;
  int64 stopped_at = 7;
  string error_message = 8;
  float cpu_usage = 9;
  uint64 ram_used_bytes = 10;
  string ipv6_address = 12;
  uint64 tx_bytes = 13;
  uint64 rx_bytes = 14;
}

message CancelRequest {
  string job_id = 1;
  string user_id = 2;
}

message CancelResponse {
  bool success = 1;
  string message = 2;
}

message ListAppsRequest {
  string user_id = 1;
  optional DeployStatus status = 2;
}

message ListAppsResponse {
  repeated AppInfo apps = 1;
}

message AppInfo {
  string job_id = 1;
  string app_id = 2;
  string app_name = 3;
  string image = 4;
  DeployStatus status = 5;
  string host_id = 6;
  string vm_id = 7;
  float cpu_usage = 8;
  uint64 ram_used_bytes = 9;
  string user_id = 10;
  string deployment_id = 11;
  string ipv6_address = 12;
  uint64 tx_bytes = 13;
  uint64 rx_bytes = 14;
}

message UpdateAppScalingConfigRequest {
  string app_id = 1;
  string user_id = 2;
  uint32 min_replicas = 3;
  uint32 max_replicas = 4;
  bool autoscaling_enabled = 5;
  double cpu_threshold = 6;
  double mem_threshold = 7;
  string vpc_ipv6_prefix = 8;
  uint32 desired_replicas = 9;
  string hostname = 10;
  int64 last_router_traffic_at = 11;
  int64 last_scaled_to_zero_at = 12;
}

message UpdateAppScalingConfigResponse {
  bool success = 1;
  string message = 2;
}

// ── VM Snapshot Operations ─────────────────────────────────────────────────
message VmSnapshotCreateRequest {
  string job_id = 1;
  string user_id = 2;
  string snapshot_name = 3;
}

message VmSnapshotCreateResponse {
  bool success = 1;
  string message = 2;
}

message VmSnapshotRestoreRequest {
  string job_id = 1;
  string user_id = 2;
  string snapshot_name = 3;
}

message VmSnapshotRestoreResponse {
  bool success = 1;
  string message = 2;
}

message VmSnapshotDeleteRequest {
  string job_id = 1;
  string user_id = 2;
  string snapshot_name = 3;
}

message VmSnapshotDeleteResponse {
  bool success = 1;
  string message = 2;
}

message VmSnapshotListRequest {
  string job_id = 1;
  string user_id = 2;
}

message VmSnapshotInfo {
  string id = 1;
  string name = 2;
  int64 created_at = 3;
  int64 size_bytes = 4;
  string vm_status = 5;
}

message VmSnapshotListResponse {
  bool success = 1;
  string message = 2;
  repeated VmSnapshotInfo snapshots = 3;
}

// ── VM Volume Hot-Plug ─────────────────────────────────────────────────────
message AttachVolumeRequest {
  string job_id = 1;
  string user_id = 2;
  string volume_id = 3;
  string mount_point = 4;
  bool read_only = 5;
}

message AttachVolumeResponse {
  bool success = 1;
  string message = 2;
}

message DetachVolumeRequest {
  string job_id = 1;
  string user_id = 2;
  string volume_id = 3;
}

message DetachVolumeResponse {
  bool success = 1;
  string message = 2;
}

// ── VM Live Migration ──────────────────────────────────────────────────────
message StartMigrationRequest {
  string job_id = 1;
  string user_id = 2;
  string target_host = 3;
  string target_uri = 4;
}

message StartMigrationResponse {
  bool success = 1;
  string message = 2;
}

message CancelMigrationRequest {
  string job_id = 1;
  string user_id = 2;
}

message CancelMigrationResponse {
  bool success = 1;
  string message = 2;
}

message QueryMigrationRequest {
  string job_id = 1;
  string user_id = 2;
}

message QueryMigrationResponse {
  bool success = 1;
  string message = 2;
  string status = 3;
  int64 total_bytes = 4;
  int64 transferred_bytes = 5;
  int64 remaining_bytes = 6;
}

// ── VM Balloon ─────────────────────────────────────────────────────────────
message SetBalloonRequest {
  string job_id = 1;
  string user_id = 2;
  uint32 target_memory_mib = 3;
}

message SetBalloonResponse {
  bool success = 1;
  string message = 2;
}

message QueryBalloonRequest {
  string job_id = 1;
  string user_id = 2;
}

message QueryBalloonResponse {
  bool success = 1;
  string message = 2;
  uint32 actual_memory_mib = 3;
  uint32 max_memory_mib = 4;
}
