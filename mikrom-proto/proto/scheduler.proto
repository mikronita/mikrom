syntax = "proto3";

package mikrom.scheduler.v1;

option go_package = "github.com/antpard/mikrom/mikrom-router/proto/scheduler/v1";

message NetworkMeshUpdate {
  repeated Peer peers = 1;
}

message FirewallRule {
  string protocol = 1;
  int32 port_start = 2;
  int32 port_end = 3;
  string action = 4;
}

message UpdateSecurityGroupsRequest {
  string app_id = 1;
  string user_id = 2;
  repeated FirewallRule rules = 3;
}

message UpdateSecurityGroupsResponse {
  bool success = 1;
  string message = 2;
}

message Peer {
  string host_id = 1;
  string endpoint = 2;
  string wireguard_pubkey = 3;
  repeated string allowed_ips = 4;
  int32 wireguard_port = 5;
}

service SchedulerService {
  rpc RegisterWorker(RegisterWorkerRequest) returns (RegisterWorkerResponse);
  rpc ReportMetrics(ReportMetricsRequest) returns (ReportMetricsResponse);
  rpc DeployApp(DeployRequest) returns (DeployResponse);
  rpc GetAppStatus(AppStatusRequest) returns (AppStatusResponse);
  rpc GetAppLogs(GetLogsRequest) returns (stream GetLogsResponse);
  rpc CancelApp(CancelRequest) returns (CancelResponse);
  rpc PauseApp(PauseRequest) returns (PauseResponse);
  rpc ResumeApp(ResumeRequest) returns (ResumeResponse);
  rpc DeleteApp(DeleteAppRequest) returns (DeleteAppResponse);
  rpc DeleteAllByApp(DeleteAllByAppRequest) returns (DeleteAllByAppResponse);
  rpc ListApps(ListAppsRequest) returns (ListAppsResponse);
  rpc ListWorkers(ListWorkersRequest) returns (ListWorkersResponse);
  rpc WatchApps(WatchAppsRequest) returns (stream WatchAppsResponse);
  rpc CheckHealth(CheckHealthRequest) returns (CheckHealthResponse);
  rpc UpdateSecurityGroups(UpdateSecurityGroupsRequest) returns (UpdateSecurityGroupsResponse);
}

message CheckHealthRequest {
  string job_id = 1;
  string user_id = 2;
}

message CheckHealthResponse {
  bool is_healthy = 1;
  string message = 2;
}

message WatchAppsRequest {
  string user_id = 1;
}

message WatchAppsResponse {
  AppInfo app = 1;
}

message WorkerHeartbeat {
  reserved 3, 4, 5;
  string host_id = 1;
  string hostname = 2;
  ReportMetricsRequest metrics = 6;
  string wireguard_pubkey = 7;
  string wireguard_ip = 8;
  int32 wireguard_port = 9;
}

message RouterHeartbeat {
  reserved 3;
  string host_id = 1;
  string hostname = 2;
  string wireguard_pubkey = 7;
  string wireguard_ip = 8;
  int32 wireguard_port = 9;
}

message ListWorkersRequest {}

message ListWorkersResponse {
  repeated WorkerInfo workers = 1;
}

message WorkerInfo {
  reserved 3, 4, 5;
  string host_id = 1;
  string hostname = 2;
  int64 last_heartbeat = 6;
  string wireguard_pubkey = 7;
}

// ... other messages ...

message PauseRequest {
  string job_id = 1;
  string user_id = 2;
}

message PauseResponse {
  bool success = 1;
  string message = 2;
}

message ResumeRequest {
  string job_id = 1;
  string user_id = 2;
}

message ResumeResponse {
  bool success = 1;
  string message = 2;
}

message GetLogsRequest {
  string job_id = 1;
  string user_id = 2;
  bool follow = 3;
}

message GetLogsResponse {
  string line = 1;
  int64 timestamp = 2;
}

message DeleteAppRequest {
  string job_id = 1;
  string user_id = 2;
}

message DeleteAppResponse {
  bool success = 1;
  string message = 2;
}

message DeleteAllByAppRequest {
  string app_id = 1;
  string user_id = 2;
}

message DeleteAllByAppResponse {
  bool success = 1;
  string message = 2;
}

message RegisterWorkerRequest {
  reserved 3, 4, 5;
  string host_id = 1;
  string hostname = 2;
  string wireguard_pubkey = 6;
}

message RegisterWorkerResponse {
  bool success = 1;
  string message = 2;
}

message VmMetrics {
  reserved 5;
  float cpu_usage = 1;
  uint64 ram_used_bytes = 2;
  VmStatus status = 3;
  string error_message = 4;
  uint64 tx_bytes = 6;
  uint64 rx_bytes = 7;
}

enum VmStatus {
  VM_STATUS_UNSPECIFIED = 0;
  VM_STATUS_STARTING = 1;
  VM_STATUS_RUNNING = 2;
  VM_STATUS_STOPPING = 3;
  VM_STATUS_STOPPED = 4;
  VM_STATUS_FAILED = 5;
  VM_STATUS_PAUSED = 6;
}

message ReportMetricsRequest {
  string host_id = 1;
  float cpu_usage = 2;
  uint64 ram_used_bytes = 3;
  uint64 ram_total_bytes = 4;
  uint64 disk_used_bytes = 5;
  uint64 disk_total_bytes = 6;
  uint32 apps_count = 7;
  int64 timestamp = 8;
  float load_avg_1 = 9;
  float load_avg_5 = 10;
  float load_avg_15 = 11;
  map<string, VmMetrics> vms = 12;
}

message ReportMetricsResponse {
  bool success = 1;
}

message DeployRequest {
  string app_id = 1;
  string app_name = 2;
  string image = 3;
  AppConfig config = 4;
  string user_id = 5;
  string deployment_id = 6;
  string vpc_ipv6_prefix = 7;
}

message Volume {
  string volume_id = 1;
  uint64 size_mib = 2;
  bool read_only = 3;
}

message AppConfig {
  reserved 5, 6, 7;
  uint32 vcpus = 1;
  uint32 memory_mib = 2;
  uint32 disk_mib = 3;
  map<string, string> env = 4;
  repeated Volume volumes = 8;
  uint32 port = 9;
  string health_check_path = 10;
  string ipv6_address = 11;
  string ipv6_gateway = 12;
}


message DeployResponse {
  reserved 6;
  string job_id = 1;
  DeployStatus status = 2;
  string host_id = 3;
  string vm_id = 4;
  string message = 5;
}

enum DeployStatus {
  DEPLOY_STATUS_UNSPECIFIED = 0;
  DEPLOY_STATUS_PENDING = 1;
  DEPLOY_STATUS_SCHEDULED = 2;
  DEPLOY_STATUS_RUNNING = 3;
  DEPLOY_STATUS_FAILED = 4;
  DEPLOY_STATUS_CANCELLED = 5;
  DEPLOY_STATUS_PAUSED = 6;
}

message AppStatusRequest {
  string job_id = 1;
  string user_id = 2;
}

message AppStatusResponse {
  reserved 11;
  string job_id = 1;
  DeployStatus status = 2;
  string host_id = 3;
  string vm_id = 4;
  int64 scheduled_at = 5;
  int64 started_at = 6;
  int64 stopped_at = 7;
  string error_message = 8;
  float cpu_usage = 9;
  uint64 ram_used_bytes = 10;
  string ipv6_address = 12;
  uint64 tx_bytes = 13;
  uint64 rx_bytes = 14;
}

message CancelRequest {
  string job_id = 1;
  string user_id = 2;
}

message CancelResponse {
  bool success = 1;
  string message = 2;
}

message ListAppsRequest {
  string user_id = 1;
  optional DeployStatus status = 2;
}

message ListAppsResponse {
  repeated AppInfo apps = 1;
}

message AppInfo {
  string job_id = 1;
  string app_id = 2;
  string app_name = 3;
  string image = 4;
  DeployStatus status = 5;
  string host_id = 6;
  string vm_id = 7;
  float cpu_usage = 8;
  uint64 ram_used_bytes = 9;
  string user_id = 10;
  string deployment_id = 11;
  string ipv6_address = 12;
  uint64 tx_bytes = 13;
  uint64 rx_bytes = 14;
}
