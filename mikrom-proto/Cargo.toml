[package]
name = "mikrom-proto"
version = "0.1.1"
edition = "2024"
description = "Shared proto definitions for mikrom services"

[dependencies]
tonic = { workspace = true }
prost = { workspace = true }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
rcgen = { version = "0.13", features = ["crypto"] }

[build-dependencies]
tonic-build = { workspace = true }

[[bin]]
name = "cert-gen"
path = "src/bin/cert_gen.rs"

[features]
default = ["build"]
build = []
