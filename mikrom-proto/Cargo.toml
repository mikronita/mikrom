[package]
name = "mikrom-proto"
version = "0.1.0"
edition = "2024"
description = "Shared proto definitions for mikrom services"

[dependencies]
tonic = { version = "0.12", features = ["transport", "tls"] }
prost = "0.13"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
rcgen = { version = "0.13", features = ["crypto"] }

[build-dependencies]
tonic-build = "0.12"

[[bin]]
name = "cert-gen"
path = "src/bin/cert_gen.rs"

[features]
default = ["build"]
build = []
