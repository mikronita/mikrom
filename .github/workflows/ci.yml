name: CI

# ── Triggers ───────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

# ── Global permissions (read-only baseline) ────────────────────────────────────
permissions:
  contents: read

# Cancel in-progress runs for the same ref on force-push / new commits
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/antpard/mikrom

# ══════════════════════════════════════════════════════════════════════════════
# JOBS: Linting (Parallel)
# ══════════════════════════════════════════════════════════════════════════════
jobs:
  lint-rust:
    name: Lint Rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Ceph development libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y librados-dev librbd-dev

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Rust fmt check
        run: cargo fmt --all -- --check

      - name: Rust clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: mikrom-app/pnpm-lock.yaml

      - name: Restore Next.js cache
        uses: actions/cache@v5
        with:
          path: |
            mikrom-app/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('mikrom-app/pnpm-lock.yaml') }}-${{ hashFiles('mikrom-app/app/**/*.{js,jsx,ts,tsx}') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('mikrom-app/pnpm-lock.yaml') }}-

      - name: Install frontend dependencies
        working-directory: mikrom-app
        run: pnpm install --frozen-lockfile

      - name: pnpm lint
        working-directory: mikrom-app
        run: pnpm lint

# ══════════════════════════════════════════════════════════════════════════════
# JOB: test
# ══════════════════════════════════════════════════════════════════════════════
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: mikrom
          POSTGRES_PASSWORD: mikrom_password
          POSTGRES_DB: mikrom_api
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mikrom -d mikrom_api"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      nats:
        image: nats:2.10-alpine
        ports:
          - 4222:4222
      nats-test:
        image: nats:2.10-alpine
        ports:
          - 4223:4222

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf /usr/lib/jvm
          df -h

      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Ceph development libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y librados-dev librbd-dev

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Initialize test databases
        run: |
          chmod +x scripts/init-db.sh
          PGPASSWORD=mikrom_password ./scripts/init-db.sh
        env:
          POSTGRES_USER: mikrom
          POSTGRES_DB: mikrom_api
          PGHOST: localhost

      - name: Test mikrom-api
        env:
          TEST_DATABASE_URL: postgres://mikrom:mikrom_password@localhost:5432/mikrom_api_test
          TEST_NATS_URL: nats://localhost:4223
          JWT_SECRET: ci-integration-test-secret
        run: cargo nextest run -p mikrom-api --all-features

      - name: Test mikrom-scheduler
        env:
          TEST_DATABASE_URL: postgres://mikrom:mikrom_password@localhost:5432/mikrom_scheduler_test
          TEST_NATS_URL: nats://localhost:4223
        run: cargo nextest run -p mikrom-scheduler --all-features

      - name: Test other components
        env:
          TEST_NATS_URL: nats://localhost:4223
        run: cargo nextest run --workspace --exclude mikrom-api --exclude mikrom-router --exclude mikrom-scheduler --all-features

      - name: Integration tests
        working-directory: mikrom-api
        env:
          TEST_DATABASE_URL: postgres://mikrom:mikrom_password@localhost:5432/mikrom_api_test
          TEST_NATS_URL: nats://localhost:4223
          JWT_SECRET: ci-integration-test-secret
        run: cargo nextest run --test integration --all-features

