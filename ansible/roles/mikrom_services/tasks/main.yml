---
- name: Define enabled Mikrom services
  ansible.builtin.set_fact:
    mikrom_services_definitions:
      - { name: mikrom-network, enabled: "{{ mikrom_enable_network }}", env: network.env.j2 }
      - { name: mikrom-dns, enabled: "{{ mikrom_enable_dns }}", env: dns.env.j2 }
      - { name: mikrom-api, enabled: "{{ mikrom_enable_api }}", env: api.env.j2 }
      - { name: mikrom-scheduler, enabled: "{{ mikrom_enable_scheduler }}", env: scheduler.env.j2 }
      - { name: mikrom-builder, enabled: "{{ mikrom_enable_builder }}", env: builder.env.j2 }
      - { name: mikrom-router, enabled: "{{ mikrom_enable_router }}", env: router.env.j2 }
      - { name: mikrom-agent, enabled: "{{ mikrom_enable_agent }}", env: agent.env.j2 }
      - { name: mikrom-app, enabled: "{{ mikrom_enable_app }}", env: app.env.j2 }

- name: Install Firecracker and Cloud Hypervisor runtime
  ansible.builtin.include_tasks: agent-runtime.yml
  when: mikrom_enable_agent

# Note: no_log is intentionally not set here. The template module only logs
# file metadata (path, checksum, mode), and the registered per-item changed
# flags are required below to restart only the services that actually changed.
# Avoid running with --diff if leaking env file contents is a concern.
- name: Install service environment files
  ansible.builtin.template:
    src: "{{ item.env }}"
    dest: "{{ mikrom_config_dir }}/{{ item.name }}.env"
    owner: root
    group: root
    mode: '0600'
  loop: "{{ mikrom_services_definitions }}"
  when: item.enabled | bool
  register: mikrom_services_env

- name: Install Mikrom systemd units
  ansible.builtin.template:
    src: mikrom.service.j2
    dest: "/etc/systemd/system/{{ item.name }}.service"
    owner: root
    group: root
    mode: '0644'
  loop: "{{ mikrom_services_definitions }}"
  when: item.enabled | bool
  register: mikrom_services_units

- name: Collect services with changed configuration
  ansible.builtin.set_fact:
    mikrom_services_changed: >-
      {{
        (
          mikrom_services_env.results | default([]) | selectattr('changed') | map(attribute='item.name')
          + mikrom_services_units.results | default([]) | selectattr('changed') | map(attribute='item.name')
        ) | unique | list
      }}

# daemon_reload runs before the restart, so unit file changes are picked up
# exactly for the services that changed. With no changes the loop is empty
# and no reload or restart happens at all.
- name: Restart changed Mikrom services
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    state: restarted
    daemon_reload: true
  loop: "{{ mikrom_services_changed }}"

- name: Enable and start Mikrom services
  ansible.builtin.systemd_service:
    name: "{{ item.name }}"
    enabled: true
    state: started
    daemon_reload: true
  loop: "{{ mikrom_services_definitions }}"
  when: item.enabled | bool

- name: Gather service state
  ansible.builtin.service_facts:

- name: Disable services explicitly excluded from this host
  ansible.builtin.systemd_service:
    name: "{{ item.name }}"
    enabled: false
    state: stopped
  loop: "{{ mikrom_services_definitions }}"
  when:
    - not (item.enabled | bool)
    - ansible_facts.services[item.name + '.service'] is defined
  failed_when: false
