---
# Replace the inventory address. Secrets live encrypted in group_vars/all/vault.yml.
mikrom_repo_url: https://github.com/mikronita/mikrom.git
mikrom_repo_version: main
mikrom_install_dir: /opt/mikrom
mikrom_config_dir: /etc/mikrom
mikrom_data_dir: /var/lib/mikrom
mikrom_runtime_user: root
mikrom_runtime_group: root
mikrom_build_user: root
mikrom_build_home: /root

mikrom_postgres_user: mikrom
mikrom_postgres_password: "{{ vault_mikrom_postgres_password }}"
mikrom_postgres_databases:
  - mikrom_default
  - mikrom_api
  - mikrom_scheduler
  - mikrom_router
mikrom_jwt_secret: "{{ vault_mikrom_jwt_secret }}"
mikrom_master_key: "{{ vault_mikrom_master_key }}"

mikrom_nats_url: nats://127.0.0.1:4222
mikrom_nats_version: 2.10.26
# Checksums from the upstream SHA256SUMS release file. Required for idempotent
# downloads: GitHub's signed asset URLs do not honor conditional requests.
mikrom_nats_sha256:
  x86_64: 6cbac67107e69c9e5a352d6f1555027f9da6a6b3fa81cceafefa9598b4451512
  aarch64: aba1b169f18d4441b4b5d760805c562dccc57b425a7a213a82753a2269a27235
mikrom_buildkit_version: 0.20.2
# BuildKit publishes no checksums; these are computed from the release tarballs.
mikrom_buildkit_sha256:
  x86_64: f64589601e0f06164041dc6be45ed259cffb67539130e434d236551d63ab6030
  aarch64: 6181f3a287da05a6092940d0f44672b2200ec81fdc30104eeb923ff134b72cec
mikrom_buildkit_host: tcp://127.0.0.1:1234
# Pinned to an exact version: the community.general.npm module only is
# idempotent when the requested version matches the installed one exactly.
mikrom_pnpm_version: 10.34.5
mikrom_zig_version: 0.17.0-dev.1422+e863bf3be
mikrom_zig_sha256: 029b14cd9bc84b30f7766c0ec568d214ca4ce36049749b78d9eb37bb6f4e28ce
mikrom_railpack_version: 0.31.1
mikrom_railpack_sha256:
  x86_64: 606403d40d7229e205554e0dba6bdaf8922308fa6447182dfc33dcc338a47a80
  aarch64: 0c4418d56877d67351f0853278235c003d2d94f8b3e58f4ca85ecb51bd07e851

mikrom_domain: mikrom.example.com
mikrom_api_domain: api.mikrom.example.com
mikrom_acme_email: admin@example.com
mikrom_acme_staging: true
mikrom_frontend_url: "https://{{ mikrom_domain }}"
mikrom_app_host: 127.0.0.1
mikrom_app_port: 3000

mikrom_registry: registry.example.com/mikrom
mikrom_registry_user: ""
mikrom_registry_password: "{{ vault_mikrom_registry_password }}"

# Polar billing. Empty values pass API startup validation; set real credentials
# (ideally in vault.yml) to enable billing endpoints.
mikrom_polar_access_token: ""
mikrom_polar_webhook_secret: ""
mikrom_polar_checkout_product_id: ""

mikrom_host_id: node-1
mikrom_bridge_ip: fd00::1/64
mikrom_advertise_address: fd00::2
mikrom_router_advertise_address: fd00::1
mikrom_network_wg_port: 51823
mikrom_router_wg_port: 51821

mikrom_enable_postgresql: true
mikrom_enable_nats: true
mikrom_enable_buildkit: true
mikrom_enable_docker: true
mikrom_enable_network: true
mikrom_enable_dns: true
mikrom_enable_api: true
mikrom_enable_scheduler: true
mikrom_enable_builder: true
mikrom_enable_router: true
mikrom_enable_agent: true
mikrom_enable_app: true

# Optional VM artifacts. Empty URLs leave the directories ready for manual provisioning.
# SHA256 checksums make the downloads idempotent even when the remote server does
# not support conditional requests (signed URLs, mirrors). The pinned checksums
# match the official releases; set one to "" only when overriding the matching
# URL with a different artifact.
mikrom_firecracker_version: 1.12.1
mikrom_firecracker_url: ""
# Checksums from the upstream .tgz.sha256.txt release files.
mikrom_firecracker_sha256:
  x86_64: 0a75e67ef6e4c540a2cf248b06822b0be9820cbba9fe19f9e0321200fe76ff6b
  aarch64: 785bc9d30756bff0c03fb275baac957363f9ba98f78a2272405dcb6929ebb953
mikrom_firecracker_kernel_url: ""
mikrom_firecracker_kernel_sha256: ""
mikrom_firecracker_rootfs_url: ""
mikrom_firecracker_rootfs_sha256: ""
mikrom_cloud_hypervisor_version: "44.0"
mikrom_cloud_hypervisor_url: ""
mikrom_cloud_hypervisor_sha256: f58e5d8684a5cbd7c4b8a001a1188ac79b9d4dda8115e1b3d5faa8c29038119c
mikrom_cloud_hypervisor_kernel_url: ""
mikrom_cloud_hypervisor_kernel_sha256: ""
mikrom_cloud_hypervisor_rootfs_url: ""
mikrom_cloud_hypervisor_rootfs_sha256: ""

mikrom_enable_telemetry: false
mikrom_otel_endpoint: http://127.0.0.1:4318
