[package]
name = "mikrom-router"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow.workspace = true
async-nats.workspace = true
async-trait = "0.1.89"
chrono = "0.4.44"
futures-util = "0.3.32"
hostname = "0.4.2"
mikrom-proto = { version = "0.1.1", path = "../mikrom-proto" }
openssl = "0.10.79"
openssl-sys = "0.9.115"
pingora = { version = "0.8.0", features = ["openssl", "lb", "proxy"] }
pingora-openssl = "0.8.0"
prost.workspace = true
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
sqlx = { version = "0.8.6", features = ["runtime-tokio-rustls", "postgres"] }
tokio = { workspace = true, features = ["full"] }
tracing = "0.1.44"
tracing-subscriber = "0.3.23"
x509-parser = "0.18.1"

[lints]
workspace = true

[dev-dependencies]
tempfile = "3.27.0"
tokio-test = "0.4.5"
